name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF_NAME}
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/md-reader-${TAG}.apk || \
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/md-reader-${TAG}.apk || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MD阅读器 ${{ github.ref_name }}
          body: |
            ## MD阅读器 ${{ github.ref_name }}

            ### v1.6.0 新特性
            - 支持 **.docx / .doc / .txt** 文档打开（Word 文档自动转换为可阅读格式）
            - **图片 & 视频修复**：Vault 内图片/视频现在可正确加载
            - `![[doc.md]]` **引用展开**：点击折叠条内联展开被引用文档
            - **任务列表** `- [ ]` / `- [x]` 渲染为复选框
            - **显示设置新增开关**：关闭 Frontmatter 元数据 / 关闭引用块样式
            - **搜索流畅性优化**：全库搜索异步化，不卡顿
            - 快速切换文档时不再停留在旧内容
            - 自动检查更新，发现新版本可直接下载安装

            ### 所有支持的格式
            `.md` `.markdown` `.txt` `.docx` `.doc`

            ### 安装
            下载 APK，在设备上允许未知来源安装后直接安装。
            > 如遇"解析包失败"，请先卸载旧版本。
          files: app/build/outputs/apk/release/md-reader-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
