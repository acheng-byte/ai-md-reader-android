name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p keystore
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore/mdreader-release.jks
            cat > keystore/keystore.properties <<EOF
          storeFile=keystore/mdreader-release.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF
            echo "Release keystore configured."
          else
            echo "KEYSTORE_BASE64 not set — falling back to debug signing."
          fi

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF_NAME}
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/MDReader-${TAG}.apk 2>/dev/null || \
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/MDReader-${TAG}.apk || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MD阅读器 ${{ github.ref_name }}
          body_path: docs/RELEASE_NOTES_${{ github.ref_name }}.md
          files: app/build/outputs/apk/release/MDReader-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
