name: MDReader
options:
  bundleIdPrefix: com.mdreader
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "2.3.5"
    CURRENT_PROJECT_VERSION: "24"
    DEVELOPMENT_TEAM: ""          # 由发布者填入自己的 Team ID（TestFlight 阶段）
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad

targets:
  MDReader:
    type: application
    platform: iOS
    sources:
      - path: MDReader/App
      - path: MDReader/Views
      - path: MDReader/Model
      - path: MDReader/Resources/Assets.xcassets
      - path: MDReader/Resources/web
        type: folder              # 文件夹引用：保留 web/ 与 lib/ 目录结构进包
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mdreader.app
        PRODUCT_NAME: MDReader
        INFOPLIST_FILE: MDReader/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: "24"
        MARKETING_VERSION: "2.3.5"
