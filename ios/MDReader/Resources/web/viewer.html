<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="color-scheme" content="light dark">
    <link id="hljs-light" rel="stylesheet" href="lib/hljs-github.min.css">
    <link id="hljs-dark" rel="stylesheet" href="lib/hljs-github-dark.min.css" disabled>
    <link rel="stylesheet" href="lib/katex.min.css">
    <link rel="stylesheet" href="app.css">
    <script src="lib/markdown-it.min.js"></script>
    <script src="lib/highlight.min.js"></script>
    <script src="lib/mermaid.min.js"></script>
    <script src="lib/katex.min.js"></script>
    <script src="lib/auto-render.min.js"></script>
</head>
<body data-mode="preview">
    <div id="preview" class="markdown-body"></div>
    <pre id="code" class="code-view"><code class="language-markdown"></code></pre>

    <!-- TOC 占位（iOS 由原生 SwiftUI OutlineSheet 呈现） -->
    <div id="toc-overlay" class="toc-overlay" style="display:none">
        <div class="toc-panel">
            <div class="toc-header">目录</div>
            <div id="toc-empty" class="toc-empty" style="display:none">无标题</div>
            <div id="toc-list" class="toc-list"></div>
        </div>
    </div>

    <!-- 搜索覆层 -->
    <div id="search-overlay" class="search-overlay" style="display:none">
        <div class="search-bar">
            <div class="search-input-wrap">
                <input id="search-input" type="text" placeholder="搜索…" autocomplete="off" />
                <button id="search-clear" class="search-clear-btn" title="清除" style="display:none">&#10005;</button>
            </div>
            <span id="search-count" class="search-count"></span>
            <button id="search-prev" class="search-btn" title="上一个">&#8679;</button>
            <button id="search-next" class="search-btn" title="下一个">&#8681;</button>
            <button id="search-vault-btn" class="search-btn search-vault-toggle" title="搜索全库">&#128269;</button>
            <button id="search-close" class="search-btn" title="关闭">&#10005;</button>
        </div>
        <div id="vault-results" class="vault-results" style="display:none"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
