<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="color-scheme" content="light dark">
    <link id="hljs-light" rel="stylesheet" href="lib/hljs-github.min.css">
    <link id="hljs-dark" rel="stylesheet" href="lib/hljs-github-dark.min.css" disabled>
    <link rel="stylesheet" href="app.css">
    <script src="lib/markdown-it.min.js"></script>
    <script src="lib/highlight.min.js"></script>
    <script src="lib/mermaid.min.js"></script>
</head>
<body data-mode="preview">
    <div id="preview" class="markdown-body"></div>
    <pre id="code" class="code-view"><code class="language-markdown"></code></pre>

    <!-- TOC 占位（iOS 由原生 SwiftUI OutlineSheet 呈现） -->
    <div id="toc-overlay" class="toc-overlay" style="display:none">
        <div class="toc-panel">
            <div class="toc-header">目录</div>
            <div id="toc-empty" class="toc-empty" style="display:none">无标题</div>
            <div id="toc-list" class="toc-list"></div>
        </div>
    </div>

    <!-- 搜索占位（iOS 暂未实现原生搜索 UI） -->
    <div id="search-overlay" style="display:none">
        <input id="search-input" type="text">
        <span id="search-count"></span>
        <button id="search-prev"></button>
        <button id="search-next"></button>
        <button id="search-close"></button>
        <button id="search-vault-btn"></button>
        <div id="vault-results"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
